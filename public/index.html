<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Notes</title>
  <style>
    :root {
      --bg-start: #fff7fb;
      --bg-end: #eef8ff;
      --text: #243447;
      --muted: #6c7a89;
      --card: rgba(255, 255, 255, 0.92);
      --primary: #f472b6;
      --primary-strong: #ec4899;
      --danger: #fb7185;
      --border: rgba(148, 163, 184, 0.2);
      --shadow: 0 14px 28px rgba(148, 163, 184, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
      padding: 24px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.1rem;
      letter-spacing: 0.4px;
      color: #334155;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.97rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      font-size: 0.9rem;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      background: rgba(255, 255, 255, 0.98);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-strong);
      transform: translateY(-1px);
    }

    .danger {
      background: #fff1f2;
      color: var(--danger);
    }

    .danger:hover {
      background: #ffe4e6;
    }

    .ghost {
      background: #f8fbff;
      color: #475569;
    }

    .notes {
      display: grid;
      gap: 10px;
      max-height: 430px;
      overflow: auto;
      padding-right: 4px;
    }

    .note-item {
      background: linear-gradient(180deg, #ffffff, #fffafe);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .note-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .note-title {
      margin: 0;
      font-size: 1rem;
      word-break: break-word;
    }

    .note-meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .note-content {
      margin-top: 8px;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: #334155;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.6);
    }

    .status {
      margin-top: 10px;
      min-height: 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .panel.hero {
      position: relative;
      overflow: hidden;
    }

    .panel.hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 190px;
      height: 190px;
      border-radius: 999px;
      background: radial-gradient(circle at center, rgba(244, 114, 182, 0.22), rgba(125, 211, 252, 0.08));
      pointer-events: none;
    }

    @media (max-width: 820px) {
      body {
        padding: 14px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
      .panel {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel hero">
      <h1>My Daily Notes</h1>
      <p class="subtitle">A cozy little space for your thoughts, plans, and everyday moments.</p>
    </section>

    <section class="grid">
      <article class="panel">
        <label for="titleInput">Title</label>
        <input id="titleInput" type="text" placeholder="e.g. Project idea" />

        <label for="contentInput" style="margin-top: 10px;">Note</label>
        <textarea id="contentInput" placeholder="Write your note here..."></textarea>

        <div class="toolbar">
          <button class="primary" id="saveBtn">Save Note</button>
          <button class="ghost" id="clearBtn">Clear Form</button>
          <button class="danger" id="deleteBtn" disabled>Delete Selected</button>
        </div>
        <div class="status" id="status"></div>
      </article>

      <article class="panel">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="text" placeholder="Search by title or content..." />
        <div class="notes" id="notesList" style="margin-top: 12px;"></div>
      </article>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "local_notes_v1";
    let notes = [];
    let selectedId = null;

    const titleInput = document.getElementById("titleInput");
    const contentInput = document.getElementById("contentInput");
    const searchInput = document.getElementById("searchInput");
    const notesList = document.getElementById("notesList");
    const statusEl = document.getElementById("status");
    const deleteBtn = document.getElementById("deleteBtn");

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function loadNotes() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        notes = raw ? JSON.parse(raw) : [];
      } catch (_err) {
        notes = [];
      }
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function formatDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString();
    }

    function clearForm() {
      selectedId = null;
      titleInput.value = "";
      contentInput.value = "";
      deleteBtn.disabled = true;
    }

    function fillForm(note) {
      selectedId = note.id;
      titleInput.value = note.title;
      contentInput.value = note.content;
      deleteBtn.disabled = false;
    }

    function renderNotes() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = notes
        .filter((n) => (n.title + " " + n.content).toLowerCase().includes(keyword))
        .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

      if (!filtered.length) {
        notesList.innerHTML = '<div class="empty">No notes yet. Add your first one.</div>';
        return;
      }

      notesList.innerHTML = filtered.map((note) => `
        <div class="note-item" data-id="${note.id}">
          <div class="note-head">
            <h3 class="note-title">${escapeHtml(note.title || "Untitled")}</h3>
            <button class="ghost" data-action="open" data-id="${note.id}">Open</button>
          </div>
          <p class="note-meta">Updated: ${formatDate(note.updatedAt)}</p>
          <p class="note-content">${escapeHtml(truncate(note.content, 140))}</p>
        </div>
      `).join("");
    }

    function truncate(text, max) {
      return text.length > max ? `${text.slice(0, max)}...` : text;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title && !content) {
        setStatus("Please enter at least a title or note content.");
        return;
      }

      if (selectedId) {
        notes = notes.map((n) => n.id === selectedId
          ? { ...n, title, content, updatedAt: new Date().toISOString() }
          : n);
        setStatus("Note updated.");
      } else {
        const now = new Date().toISOString();
        notes.push({
          id: crypto.randomUUID(),
          title,
          content,
          createdAt: now,
          updatedAt: now
        });
        setStatus("New note saved.");
      }

      saveNotes();
      renderNotes();
      clearForm();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      clearForm();
      setStatus("Form cleared.");
    });

    deleteBtn.addEventListener("click", () => {
      if (!selectedId) return;
      notes = notes.filter((n) => n.id !== selectedId);
      saveNotes();
      renderNotes();
      clearForm();
      setStatus("Note deleted.");
    });

    notesList.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const id = target.dataset.id;
      const action = target.dataset.action;
      if (action !== "open" || !id) return;

      const note = notes.find((n) => n.id === id);
      if (!note) return;
      fillForm(note);
      setStatus(`Editing: ${note.title || "Untitled"}`);
    });

    searchInput.addEventListener("input", renderNotes);

    loadNotes();
    renderNotes();
  </script>
</body>
</html>
